# pt-viewer web — Hono SSR on Cloudflare Workers, backed by D1 (read-only data).
name = "pt-viewer"
main = "src/index.tsx"
compatibility_date = "2025-06-01"

# Static assets (built Tailwind stylesheet, favicon). Anything not matching a
# file in ./public falls through to the Worker.
[assets]
directory = "./public"

[[d1_databases]]
binding = "DB"
database_name = "pt-viewer"
database_id = "1be26e34-87fa-4831-97f8-e715abfdae84"
